<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI Trading League</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }

    header { padding: 24px 32px; border-bottom: 1px solid #1e2433; display: flex; align-items: center; gap: 12px; }
    header h1 { font-size: 20px; font-weight: 600; }
    header .badge { background: #1a3a2a; color: #4ade80; font-size: 11px; padding: 3px 8px; border-radius: 20px; border: 1px solid #166534; }

    .container { max-width: 1100px; margin: 0 auto; padding: 32px; }

    /* Tabs */
    .tabs { display: flex; gap: 4px; margin-bottom: 28px; border-bottom: 1px solid #1e2433; }
    .tab { padding: 10px 18px; font-size: 14px; color: #64748b; cursor: pointer; border-bottom: 2px solid transparent; transition: all .2s; }
    .tab.active { color: #e2e8f0; border-bottom-color: #6366f1; }

    /* Cards de IAs */
    .ia-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 16px; margin-bottom: 32px; }
    .ia-card { background: #161b27; border: 1px solid #1e2433; border-radius: 12px; padding: 20px; }
    .ia-card .name { font-size: 13px; color: #64748b; margin-bottom: 4px; }
    .ia-card .value { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .ia-card .pct { font-size: 14px; }
    .ia-card .pct.up { color: #4ade80; }
    .ia-card .pct.down { color: #f87171; }
    .ia-card .meta { font-size: 12px; color: #475569; margin-top: 8px; }

    /* Razonamiento */
    .reasoning-card { background: #161b27; border: 1px solid #1e2433; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .reasoning-card .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px; }
    .reasoning-card .ia-name { font-weight: 600; font-size: 16px; }
    .reasoning-card .fecha { font-size: 12px; color: #475569; }
    .reasoning-card .confianza { font-size: 12px; background: #1e2433; padding: 4px 10px; border-radius: 20px; }
    .section-label { font-size: 11px; text-transform: uppercase; letter-spacing: .08em; color: #475569; margin-bottom: 6px; }
    .reasoning-text { font-size: 14px; line-height: 1.7; color: #94a3b8; margin-bottom: 16px; }
    .outlook-text { font-size: 14px; line-height: 1.7; color: #7c9bbf; font-style: italic; }

    /* Operaciones */
    .ops-list { display: flex; flex-direction: column; gap: 8px; margin-top: 16px; }
    .op-item { display: flex; align-items: flex-start; gap: 12px; padding: 12px 16px; background: #0f1117; border-radius: 8px; border: 1px solid #1e2433; }
    .op-badge { font-size: 11px; font-weight: 700; padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0; }
    .op-badge.comprar { background: #14532d; color: #4ade80; }
    .op-badge.vender { background: #450a0a; color: #f87171; }
    .op-ticker { font-weight: 600; font-size: 14px; white-space: nowrap; flex-shrink: 0; min-width: 80px; }
    .op-justificacion { font-size: 13px; color: #64748b; line-height: 1.5; }

    /* Historial de valor */
    .chart-area { background: #161b27; border: 1px solid #1e2433; border-radius: 12px; padding: 24px; margin-bottom: 20px; }
    .chart-area h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
    .history-list { display: flex; flex-direction: column; gap: 6px; }
    .history-row { display: flex; justify-content: space-between; font-size: 13px; padding: 8px 0; border-bottom: 1px solid #1e2433; }
    .history-row:last-child { border-bottom: none; }

    /* Posiciones */
    .positions-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .positions-table th { text-align: left; padding: 8px 12px; color: #475569; font-weight: 500; border-bottom: 1px solid #1e2433; }
    .positions-table td { padding: 10px 12px; border-bottom: 1px solid #0f1117; }
    .positions-table tr:last-child td { border-bottom: none; }

    .loading { text-align: center; padding: 60px; color: #475569; font-size: 14px; }
    .error-msg { background: #450a0a; border: 1px solid #7f1d1d; border-radius: 8px; padding: 16px; color: #fca5a5; font-size: 14px; margin-bottom: 20px; }

    /* Indices bar */
    .indices-bar { display: flex; gap: 20px; flex-wrap: wrap; margin-bottom: 28px; }
    .index-item { font-size: 13px; }
    .index-item .idx-name { color: #475569; }
    .index-item .idx-val { font-weight: 600; margin: 0 4px; }
    .index-item .idx-chg.up { color: #4ade80; }
    .index-item .idx-chg.down { color: #f87171; }
  </style>
</head>
<body>

<header>
  <h1>🤖 AI Trading League</h1>
  <span class="badge">● En vivo</span>
</header>

<div class="container">

  <div class="tabs">
    <div class="tab active" onclick="showTab('resumen')">Resumen</div>
    <div class="tab" onclick="showTab('razonamiento')">Razonamiento</div>
    <div class="tab" onclick="showTab('posiciones')">Posiciones</div>
    <div class="tab" onclick="showTab('historial')">Historial</div>
  </div>

  <div id="tab-resumen">
    <div id="indices-bar" class="indices-bar"></div>
    <div id="ia-cards" class="ia-grid"><div class="loading">Cargando datos...</div></div>
  </div>

  <div id="tab-razonamiento" style="display:none">
    <div id="reasoning-content"><div class="loading">Cargando...</div></div>
  </div>

  <div id="tab-posiciones" style="display:none">
    <div id="positions-content"><div class="loading">Cargando...</div></div>
  </div>

  <div id="tab-historial" style="display:none">
    <div id="history-content"><div class="loading">Cargando...</div></div>
  </div>

</div>

<script>
  // ── CONFIGURACIÓN ─────────────────────────────────────────────
  // Cambia esto por tu usuario y nombre de repositorio de GitHub
  const GITHUB_USER = "TU_USUARIO_GITHUB";
  const GITHUB_REPO = "ai-trading-league";
  const BASE_URL = `https://raw.githubusercontent.com/${GITHUB_USER}/${GITHUB_REPO}/main/data`;

  // IAs activas (añade más cuando conectes nuevas APIs)
  const IAS = [
    { id: "gemini", nombre: "Gemini 2.5 Flash", color: "#4285f4" },
    // { id: "claude",  nombre: "Claude Opus",       color: "#7c3aed" },  // próximamente
    // { id: "gpt",     nombre: "ChatGPT-4o",        color: "#10a37f" },  // próximamente
    // { id: "deepseek",nombre: "DeepSeek R2",        color: "#e85d04" },  // próximamente
  ];

  let allData = {};

  // ── CARGA DE DATOS ────────────────────────────────────────────
  async function loadData() {
    for (const ia of IAS) {
      try {
        const res = await fetch(`${BASE_URL}/latest_${ia.id}.json`);
        if (res.ok) allData[ia.id] = await res.json();
      } catch (e) {
        console.warn(`No se pudo cargar ${ia.id}:`, e);
      }
    }
    renderAll();
  }

  function renderAll() {
    renderIndices();
    renderCards();
    renderReasoning();
    renderPositions();
    renderHistory();
  }

  // ── ÍNDICES ───────────────────────────────────────────────────
  function renderIndices() {
    const firstIA = Object.values(allData)[0];
    if (!firstIA?.indices) return;
    const bar = document.getElementById("indices-bar");
    bar.innerHTML = Object.entries(firstIA.indices).map(([nombre, d]) => {
      const up = d.cambio_pct >= 0;
      return `<div class="index-item">
        <span class="idx-name">${nombre}</span>
        <span class="idx-val">${d.valor.toLocaleString()}</span>
        <span class="idx-chg ${up ? 'up' : 'down'}">${up ? '+' : ''}${d.cambio_pct}%</span>
      </div>`;
    }).join("");
  }

  // ── CARDS DE IAs ─────────────────────────────────────────────
  function renderCards() {
    const container = document.getElementById("ia-cards");
    container.innerHTML = IAS.map(ia => {
      const d = allData[ia.id];
      if (!d) return `<div class="ia-card"><div class="name">${ia.nombre}</div><div style="color:#475569;font-size:13px;margin-top:8px">Sin datos aún</div></div>`;
      const up = d.rentabilidad_pct >= 0;
      return `<div class="ia-card">
        <div class="name">${ia.nombre}</div>
        <div class="value">${d.valor_cartera.toLocaleString('es-ES', {minimumFractionDigits:2})}€</div>
        <div class="pct ${up ? 'up' : 'down'}">${up ? '▲' : '▼'} ${up ? '+' : ''}${d.rentabilidad_pct}% vs inicio</div>
        <div class="meta">Cash libre: ${d.cash.toLocaleString('es-ES', {minimumFractionDigits:2})}€ · Confianza: ${d.confianza}%</div>
        <div class="meta">Última actualización: ${d.fecha}</div>
      </div>`;
    }).join("");
  }

  // ── RAZONAMIENTO ──────────────────────────────────────────────
  function renderReasoning() {
    const container = document.getElementById("reasoning-content");
    container.innerHTML = IAS.map(ia => {
      const d = allData[ia.id];
      if (!d) return "";
      const ops = (d.operaciones || []).filter(o => o.accion !== "mantener");
      return `<div class="reasoning-card">
        <div class="header">
          <span class="ia-name">${ia.nombre}</span>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="confianza">Confianza: ${d.confianza}%</span>
            <span class="fecha">${d.fecha}</span>
          </div>
        </div>
        <div class="section-label">Análisis del mercado</div>
        <div class="reasoning-text">${d.razonamiento}</div>
        ${d.perspectiva ? `<div class="section-label">Perspectiva</div><div class="outlook-text">${d.perspectiva}</div>` : ""}
        ${d.resumen_cartera ? `<div class="section-label" style="margin-top:16px">Estado de la cartera</div><div class="reasoning-text">${d.resumen_cartera}</div>` : ""}
        ${ops.length > 0 ? `
          <div class="section-label" style="margin-top:16px">Operaciones de hoy</div>
          <div class="ops-list">
            ${ops.map(op => `
              <div class="op-item">
                <span class="op-badge ${op.accion}">${op.accion.toUpperCase()}</span>
                <span class="op-ticker">${op.ticker}</span>
                <span class="op-justificacion">${op.justificacion}</span>
              </div>
            `).join("")}
          </div>
        ` : `<div class="section-label" style="margin-top:16px">Sin operaciones hoy</div>`}
      </div>`;
    }).join("");
  }

  // ── POSICIONES ────────────────────────────────────────────────
  function renderPositions() {
    const container = document.getElementById("positions-content");
    container.innerHTML = IAS.map(ia => {
      const d = allData[ia.id];
      if (!d || !d.posiciones) return "";
      const pos = Object.entries(d.posiciones);
      return `<div class="reasoning-card">
        <div class="header"><span class="ia-name">${ia.nombre}</span><span class="fecha">${d.fecha}</span></div>
        ${pos.length === 0 ? '<div style="color:#475569;font-size:13px">Sin posiciones abiertas (100% cash)</div>' : `
          <table class="positions-table">
            <thead><tr>
              <th>Ticker</th><th>Acciones</th><th>Precio compra</th><th>Valor actual</th>
            </tr></thead>
            <tbody>
              ${pos.map(([ticker, p]) => `
                <tr>
                  <td style="font-weight:600">${ticker}</td>
                  <td>${p.cantidad}</td>
                  <td>${p.precio_medio.toFixed(2)}</td>
                  <td>${(p.cantidad * p.precio_medio).toLocaleString('es-ES', {minimumFractionDigits:0})}€</td>
                </tr>
              `).join("")}
            </tbody>
          </table>
        `}
      </div>`;
    }).join("");
  }

  // ── HISTORIAL ─────────────────────────────────────────────────
  function renderHistory() {
    const container = document.getElementById("history-content");
    container.innerHTML = IAS.map(ia => {
      const d = allData[ia.id];
      if (!d?.valor_historico?.length) return "";
      const sorted = [...d.valor_historico].reverse().slice(0, 30);
      return `<div class="chart-area">
        <h3>${ia.nombre} — Evolución de cartera</h3>
        <div class="history-list">
          ${sorted.map(h => {
            const up = h.rentabilidad_pct >= 0;
            return `<div class="history-row">
              <span style="color:#64748b">${h.fecha}</span>
              <span>${h.valor.toLocaleString('es-ES', {minimumFractionDigits:2})}€</span>
              <span style="color:${up ? '#4ade80' : '#f87171'}">${up ? '+' : ''}${h.rentabilidad_pct}%</span>
            </div>`;
          }).join("")}
        </div>
      </div>`;
    }).join("");
  }

  // ── TABS ──────────────────────────────────────────────────────
  function showTab(name) {
    ['resumen','razonamiento','posiciones','historial'].forEach(t => {
      document.getElementById(`tab-${t}`).style.display = t === name ? 'block' : 'none';
      document.querySelectorAll('.tab')[['resumen','razonamiento','posiciones','historial'].indexOf(t)]
        .classList.toggle('active', t === name);
    });
  }

  // ── INIT ──────────────────────────────────────────────────────
  loadData();
</script>
</body>
</html>
